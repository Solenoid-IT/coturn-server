# Reactor coturn configuration
# Single source of truth for TURN server settings in Docker deployment.

lt-cred-mech
fingerprint
no-cli
log-file=stdout

realm=reactor.local
user=reactor:change-me-now

listening-port=3478
tls-listening-port=5349
cert=/var/lib/coturn/certs/cert.pem
pkey=/var/lib/coturn/certs/key.pem
min-port=49160
max-port=49200

# Optional public address for NAT traversal:
# external-ip=YOUR_PUBLIC_IP_OR_DNS
